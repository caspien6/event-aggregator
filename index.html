<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Calendar</title>
  <style>
    :root {
      --black:       #050508;
      --black-card:  #0d0d14;
      --black-border:#1a1a2e;
      --purple-deep: #2d0a4e;
      --purple:      #7b2fff;
      --purple-mid:  #9d4edd;
      --purple-light:#c77dff;
      --neon:        #39ff14;
      --neon-dim:    #1aff0099;
      --neon-glow:   0 0 8px #39ff14, 0 0 20px #39ff1466, 0 0 40px #39ff1422;
      --purple-glow: 0 0 12px #7b2fff88, 0 0 30px #7b2fff44;
      --text:        #e8e8f0;
      --text-muted:  #888899;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BACKGROUND GRID ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--black-border) 1px, transparent 1px),
        linear-gradient(90deg, var(--black-border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 56px 24px 32px;
    }

    .header-tag {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--neon);
      border: 1px solid var(--neon);
      border-radius: 20px;
      padding: 4px 14px;
      margin-bottom: 20px;
      box-shadow: var(--neon-glow);
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 20%, var(--purple-light) 55%, var(--neon) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      max-width: 480px;
      margin: 0 auto 32px;
    }

    /* ── CONTROLS ── */
    .controls {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 0 24px 40px;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--black-border);
      color: var(--text-muted);
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: .5px;
      transition: all .2s;
    }

    .btn:hover, .btn.active {
      border-color: var(--purple);
      color: var(--purple-light);
      box-shadow: var(--purple-glow);
      background: #7b2fff11;
    }

    .btn.active {
      background: #7b2fff22;
    }

    .btn-neon {
      border-color: var(--neon);
      color: var(--neon);
    }

    .btn-neon:hover {
      box-shadow: var(--neon-glow);
      background: #39ff1411;
      color: var(--neon);
      border-color: var(--neon);
    }

    /* ── SEARCH ── */
    .search-wrap {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: center;
      padding: 0 24px 40px;
    }

    .search-input {
      background: var(--black-card);
      border: 1px solid var(--black-border);
      color: var(--text);
      padding: 10px 16px 10px 40px;
      border-radius: 10px;
      font-size: 14px;
      width: min(400px, 100%);
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--purple);
      box-shadow: var(--purple-glow);
    }

    .search-icon {
      position: absolute;
      left: calc(50% - min(200px, 50%) + 12px);
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 16px;
      pointer-events: none;
    }

    /* ── NEXT EVENT HERO ── */
    #next-event-hero {
      position: relative;
      z-index: 10;
      max-width: 860px;
      margin: 0 auto 56px;
      padding: 0 24px;
      display: none;
    }

    .hero-card {
      background: linear-gradient(135deg, var(--purple-deep) 0%, #0d0d14 60%);
      border: 1px solid var(--purple);
      border-radius: 20px;
      padding: 32px 40px;
      position: relative;
      overflow: hidden;
      box-shadow: var(--purple-glow), inset 0 0 60px #7b2fff0a;
    }

    .hero-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, #7b2fff33 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--neon);
      margin-bottom: 10px;
    }

    .hero-title {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 700;
      margin-bottom: 16px;
      color: #fff;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 20px;
    }

    .hero-meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--purple-light);
      font-size: 14px;
    }

    .hero-meta-item .icon { color: var(--neon); }

    .hero-desc {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
      max-width: 540px;
    }

    .countdown {
      display: flex;
      gap: 16px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .countdown-unit {
      text-align: center;
      background: #00000044;
      border: 1px solid var(--black-border);
      border-radius: 12px;
      padding: 12px 18px;
      min-width: 64px;
    }

    .countdown-value {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--neon);
      text-shadow: var(--neon-glow);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      display: block;
    }

    .countdown-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      position: relative;
      z-index: 10;
      text-align: center;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 32px;
      padding: 0 24px;
    }

    .section-label span {
      background: var(--black);
      padding: 0 16px;
      position: relative;
    }

    .section-label::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 10%;
      right: 10%;
      height: 1px;
      background: var(--black-border);
    }

    /* ── EVENT GRID ── */
    #events-container {
      position: relative;
      z-index: 10;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    #events-container.list-view {
      grid-template-columns: 1fr;
      max-width: 860px;
    }

    /* ── EVENT CARD ── */
    .event-card {
      background: var(--black-card);
      border: 1px solid var(--black-border);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      animation: fadeUp .4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .event-card:hover {
      transform: translateY(-4px);
      border-color: var(--purple);
      box-shadow: var(--purple-glow);
    }

    .event-card.today {
      border-color: var(--neon);
      box-shadow: var(--neon-glow);
    }

    .event-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--purple), var(--neon));
      opacity: 0;
      transition: opacity .2s;
    }

    .event-card:hover::after,
    .event-card.today::after { opacity: 1; }

    .event-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
      gap: 12px;
    }

    .event-date-badge {
      background: var(--purple-deep);
      border: 1px solid var(--purple);
      border-radius: 10px;
      padding: 6px 10px;
      text-align: center;
      min-width: 48px;
      flex-shrink: 0;
    }

    .event-date-badge .day {
      display: block;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--purple-light);
      line-height: 1;
    }

    .event-date-badge .month {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .event-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: flex-start;
    }

    .tag {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 600;
    }

    .tag-today {
      background: #39ff1422;
      color: var(--neon);
      border: 1px solid var(--neon);
    }

    .tag-upcoming {
      background: #7b2fff22;
      color: var(--purple-light);
      border: 1px solid var(--purple);
    }

    .tag-soon {
      background: #ff7b2f22;
      color: #ff9f5a;
      border: 1px solid #ff7b2f;
    }

    .event-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .event-details {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .event-detail {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .event-detail .icon {
      color: var(--purple-mid);
      font-size: 14px;
      width: 16px;
      flex-shrink: 0;
    }

    .event-detail.location .icon { color: var(--neon); }

    .event-desc {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--black-border);
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── LIST VIEW CARD OVERRIDE ── */
    #events-container.list-view .event-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    #events-container.list-view .event-date-badge {
      flex-direction: column;
      flex-shrink: 0;
    }

    #events-container.list-view .event-body {
      flex: 1;
    }

    #events-container.list-view .event-card-header {
      margin-bottom: 8px;
    }

    /* ── LOADING / EMPTY ── */
    .state-message {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }

    .state-message .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid var(--black-border);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .state-message h3 {
      font-size: 1.1rem;
      color: var(--text);
      margin-bottom: 8px;
    }


    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: #00000099;
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--black-card);
      border: 1px solid var(--purple);
      border-radius: 20px;
      padding: 36px;
      max-width: 560px;
      width: 100%;
      box-shadow: var(--purple-glow);
      transform: scale(.95);
      transition: transform .2s;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-overlay.open .modal { transform: scale(1); }

    .modal-close {
      position: absolute;
      top: 16px; right: 20px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
    }

    .modal-close:hover { color: #fff; }

    .modal-tag {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--neon);
      margin-bottom: 12px;
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 20px;
    }

    .modal-detail {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .modal-detail .icon {
      color: var(--purple-mid);
      margin-top: 1px;
      flex-shrink: 0;
    }

    .modal-desc-full {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--black-border);
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid var(--black-border);
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: .5px;
    }

    footer a { color: var(--purple-light); text-decoration: none; }

    /* ── MONTH HEADERS ── */
    .month-header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 0 4px;
      animation: fadeUp .3s ease both;
    }

    .month-header-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--purple-light);
      white-space: nowrap;
    }

    .month-header-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--purple), transparent);
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--black); }
    ::-webkit-scrollbar-thumb { background: var(--purple-deep); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--purple); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .hero-card { padding: 24px 20px; }
      .countdown-value { font-size: 1.4rem; }
      .countdown-unit { padding: 10px 12px; min-width: 52px; }
      .modal { padding: 24px 20px; }
    }

  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-tag">Live Calendar</div>
  <h1>Upcoming Events</h1>
  <p class="subtitle">Browse and discover all upcoming events from the calendar.</p>
</header>

<!-- CONTROLS -->
<div class="controls" id="controls" style="display:none">
  <button class="btn active" id="btn-all" onclick="setFilter('all', this)">All Events</button>
  <button class="btn" id="btn-upcoming" onclick="setFilter('upcoming', this)">Upcoming</button>
  <button class="btn" id="btn-month" onclick="setFilter('month', this)">This Month</button>
  <button class="btn btn-neon" id="btn-grid" onclick="setView('grid', this)">Grid</button>
  <button class="btn" id="btn-list" onclick="setView('list', this)">List</button>
  <button class="btn" onclick="refreshEvents()">↻ Refresh</button>
</div>

<!-- SEARCH -->
<div class="search-wrap" id="search-wrap" style="display:none">
  <span class="search-icon">⌕</span>
  <input class="search-input" id="search-input" type="text" placeholder="Search events…" oninput="applyFilters()" />
</div>

<!-- NEXT EVENT HERO -->
<div id="next-event-hero"></div>

<!-- SECTION LABEL -->
<div class="section-label" id="section-label" style="display:none">
  <span>All Events</span>
</div>

<!-- EVENTS -->
<div id="events-container"></div>

<!-- STATE MESSAGE -->
<div id="state-message" class="state-message">
  <div class="spinner"></div>
  <h3>Loading events…</h3>
  <p>Fetching your calendar data</p>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>Powered by <a href="https://calendar.google.com" target="_blank">Google Calendar</a> &nbsp;·&nbsp; Built with ♥</p>
</footer>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  const CALENDAR_ID = '96c8d6bcbeba42023df634a73008064ffd79155009ccbcae8e6de39dbb39acc8@group.calendar.google.com';
  const API_KEY_LS  = 'gcal_key';

  // ── STATE ────────────────────────────────────────────────
  let allEvents = [];
  let currentFilter = 'all';
  let currentView = 'grid';
  let countdownTimer = null;

  // ── INIT ─────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const key = localStorage.getItem(API_KEY_LS);
    key ? loadEvents(key) : showKeyPrompt();
  });

  function refreshEvents() {
    const key = localStorage.getItem(API_KEY_LS);
    if (key) loadEvents(key);
  }

  // ── KEY PROMPT ───────────────────────────────────────────
  function showKeyPrompt() {
    document.getElementById('state-message').innerHTML = `
      <h3>Google API Key needed</h3>
      <p style="margin:8px 0 16px;font-size:13px">
        The calendar is public — you just need a free read-only API key.<br>
        <a href="https://console.cloud.google.com/apis/credentials" target="_blank"
           style="color:var(--purple-light)">Get one here</a>
        (enable the Google Calendar API, create an API key).
      </p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <input id="key-input" type="text" placeholder="AIzaSy…"
          style="background:#0d0d14;border:1px solid #1a1a2e;color:#e8e8f0;padding:10px 14px;
                 border-radius:8px;font-family:monospace;font-size:13px;width:280px;outline:none"
          onkeydown="if(event.key==='Enter')saveKey()" />
        <button onclick="saveKey()"
          style="background:#7b2fff;color:#fff;border:none;padding:10px 20px;
                 border-radius:8px;cursor:pointer;font-size:13px;font-weight:600">
          Load
        </button>
      </div>`;
  }

  function saveKey() {
    const key = document.getElementById('key-input')?.value.trim();
    if (!key) return;
    localStorage.setItem(API_KEY_LS, key);
    loadEvents(key);
  }

  // ── FETCH ────────────────────────────────────────────────
  async function loadEvents(apiKey) {
    showLoading();
    try {
      const params = new URLSearchParams({
        key: apiKey,
        singleEvents: 'true',
        orderBy: 'startTime',
        timeMin: new Date().toISOString(),
        maxResults: '250',
      });
      const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?${params}`;
      const res = await fetch(url);
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || `HTTP ${res.status}`);
      allEvents = data.items.map(item => ({
        id:          item.id,
        title:       item.summary || 'Untitled Event',
        start:       new Date(item.start.dateTime || item.start.date),
        end:         item.end ? new Date(item.end.dateTime || item.end.date) : null,
        allDay:      !item.start.dateTime,
        location:    item.location || '',
        description: item.description || '',
        link:        item.htmlLink || '',
      }));
      renderPage();
    } catch (e) {
      localStorage.removeItem(API_KEY_LS);
      showError(e.message);
    }
  }

  // ── RENDER ───────────────────────────────────────────────
  function renderPage() {
    document.getElementById('state-message').style.display = 'none';
    document.getElementById('controls').style.display = 'flex';
    document.getElementById('search-wrap').style.display = 'flex';
    document.getElementById('section-label').style.display = 'block';
    applyFilters();
    renderHero();
  }

  function applyFilters() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const now = new Date();
    const endOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59);

    let filtered = allEvents.filter(e => {
      const matchSearch = !search || e.title.toLowerCase().includes(search) || e.description.toLowerCase().includes(search) || e.location.toLowerCase().includes(search);
      if (!matchSearch) return false;
      if (currentFilter === 'upcoming') return e.start > now;
      if (currentFilter === 'month') return e.start >= now && e.start <= endOfMonth;
      return true;
    });

    renderEvents(filtered);
  }

  function renderEvents(events) {
    const container = document.getElementById('events-container');
    container.innerHTML = '';
    container.className = currentView === 'list' ? 'list-view' : '';

    if (!events.length) {
      container.innerHTML = '<p style="text-align:center;color:var(--text-muted);grid-column:1/-1;padding:60px 0">No events found.</p>';
      return;
    }

    const now = new Date();
    let lastMonth = null;

    events.forEach((evt, i) => {
      const monthKey = evt.start.toLocaleString('default', { month: 'long', year: 'numeric' });
      if (monthKey !== lastMonth) {
        const header = document.createElement('div');
        header.className = 'month-header';
        header.style.animationDelay = `${i * 0.03}s`;
        header.innerHTML = `<span class="month-header-label">${monthKey}</span><div class="month-header-line"></div>`;
        container.appendChild(header);
        lastMonth = monthKey;
      }

      const card = document.createElement('div');
      card.className = 'event-card';
      card.style.animationDelay = `${i * 0.04}s`;

      const isToday = sameDay(evt.start, now);
      const daysDiff = Math.ceil((evt.start - now) / 86400000);
      if (isToday) card.classList.add('today');

      let tagHtml = '';
      if (isToday) tagHtml = '<span class="tag tag-today">Today</span>';
      else if (daysDiff <= 7) tagHtml = `<span class="tag tag-soon">In ${daysDiff}d</span>`;
      else tagHtml = '<span class="tag tag-upcoming">Upcoming</span>';

      const dateObj = evt.start;
      const day = dateObj.getDate();
      const month = dateObj.toLocaleString('default', { month: 'short' });
      const timeStr = evt.allDay ? 'All day' : formatTime(evt.start, evt.end);

      const descHtml = evt.description ? `<p class="event-desc">${stripHtml(evt.description)}</p>` : '';
      const locHtml  = evt.location ? `
        <div class="event-detail location">
          <span class="icon">◎</span>
          <span>${evt.location}</span>
        </div>` : '';

      const bodyHtml = `
        <div class="event-body">
          <div class="event-card-header">
            <div class="event-date-badge">
              <span class="day">${day}</span>
              <span class="month">${month}</span>
            </div>
            <div class="event-tags">${tagHtml}</div>
          </div>
          <div class="event-title">${escHtml(evt.title)}</div>
          <div class="event-details">
            <div class="event-detail">
              <span class="icon">◷</span>
              <span>${timeStr}</span>
            </div>
            ${locHtml}
          </div>
          ${descHtml}
        </div>`;

      card.innerHTML = bodyHtml;
      card.addEventListener('click', () => openModal(evt));
      container.appendChild(card);
    });
  }

  // ── HERO ─────────────────────────────────────────────────
  function renderHero() {
    if (countdownTimer) clearInterval(countdownTimer);
    const hero = document.getElementById('next-event-hero');
    const now = new Date();
    const next = allEvents.find(e => e.start > now);
    if (!next) { hero.style.display = 'none'; return; }

    hero.style.display = 'block';

    const locHtml = next.location ? `
      <div class="hero-meta-item">
        <span class="icon">◎</span>
        <span>${escHtml(next.location)}</span>
      </div>` : '';

    const descHtml = next.description ? `<p class="hero-desc">${stripHtml(next.description).slice(0, 180)}${next.description.length > 180 ? '…' : ''}</p>` : '';

    hero.innerHTML = `
      <div class="hero-card">
        <div class="hero-label">▶ Next Event</div>
        <div class="hero-title">${escHtml(next.title)}</div>
        <div class="hero-meta">
          <div class="hero-meta-item">
            <span class="icon">◷</span>
            <span>${formatFullDate(next.start)}${next.allDay ? '' : ', ' + formatTime(next.start, next.end)}</span>
          </div>
          ${locHtml}
        </div>
        ${descHtml}
        <div class="countdown" id="countdown"></div>
      </div>`;

    function tick() {
      const diff = next.start - new Date();
      if (diff <= 0) {
        document.getElementById('countdown').innerHTML = '<span style="color:var(--neon);font-size:1rem;font-weight:700">Event is now!</span>';
        return;
      }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById('countdown').innerHTML = `
        ${unit(d, 'Days')}${unit(h, 'Hours')}${unit(m, 'Mins')}${unit(s, 'Secs')}`;
    }

    function unit(n, label) {
      return `<div class="countdown-unit"><span class="countdown-value">${String(n).padStart(2,'0')}</span><div class="countdown-label">${label}</div></div>`;
    }

    tick();
    countdownTimer = setInterval(tick, 1000);
  }

  // ── MODAL ────────────────────────────────────────────────
  function openModal(evt) {
    const overlay = document.getElementById('modal-overlay');
    const body = document.getElementById('modal-body');
    const timeStr = evt.allDay ? 'All day · ' + formatFullDate(evt.start) : formatFullDate(evt.start) + ', ' + formatTime(evt.start, evt.end);
    const locHtml = evt.location ? `
      <div class="modal-detail">
        <span class="icon">◎</span>
        <div>${escHtml(evt.location)}</div>
      </div>` : '';
    const descHtml = evt.description ? `<div class="modal-desc-full">${sanitizeDesc(evt.description)}</div>` : '';
    const linkHtml = evt.link ? `<div style="margin-top:20px"><a href="${evt.link}" target="_blank" style="color:var(--neon);font-size:13px;text-decoration:none">Open in Google Calendar ↗</a></div>` : '';

    body.innerHTML = `
      <div class="modal-tag">Event Details</div>
      <div class="modal-title">${escHtml(evt.title)}</div>
      <div class="modal-detail">
        <span class="icon">◷</span>
        <div>${timeStr}</div>
      </div>
      ${locHtml}
      ${descHtml}
      ${linkHtml}`;

    overlay.classList.add('open');
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modal-overlay') || e.currentTarget.classList.contains('modal-close')) {
      document.getElementById('modal-overlay').classList.remove('open');
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal({}); });

  // ── FILTER / VIEW ────────────────────────────────────────
  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.controls .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }

  function setView(v, btn) {
    currentView = v;
    document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
    document.getElementById('btn-list').classList.toggle('active', v === 'list');
    applyFilters();
  }

  // ── LOADING / ERROR ──────────────────────────────────────
  function showLoading() {
    const msg = document.getElementById('state-message');
    msg.style.display = 'block';
    msg.innerHTML = '<div class="spinner"></div><h3>Loading events…</h3><p>Fetching your calendar data</p>';
    document.getElementById('events-container').innerHTML = '';
    document.getElementById('next-event-hero').style.display = 'none';
    document.getElementById('controls').style.display = 'none';
    document.getElementById('search-wrap').style.display = 'none';
    document.getElementById('section-label').style.display = 'none';
  }

  function showError(msg) {
    const el = document.getElementById('state-message');
    el.style.display = 'block';
    el.innerHTML = `
      <h3 style="color:#ff6b6b">Failed to load events</h3>
      <p>${escHtml(msg)}</p>
      <p style="margin-top:12px;font-size:12px">Check your network connection or try again — <button style="background:none;border:none;color:var(--purple-light);cursor:pointer;font-size:12px" onclick="loadEvents()">Retry</button></p>`;
  }

  // ── HELPERS ──────────────────────────────────────────────
  function sameDay(a, b) {
    return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
  }

  function formatTime(start, end) {
    const opts = { hour: '2-digit', minute: '2-digit' };
    if (!end) return start.toLocaleTimeString([], opts);
    return `${start.toLocaleTimeString([], opts)} – ${end.toLocaleTimeString([], opts)}`;
  }

  function formatFullDate(d) {
    return d.toLocaleDateString([], { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }

  function stripHtml(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    return tmp.textContent || tmp.innerText || '';
  }

  function sanitizeDesc(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    tmp.querySelectorAll('script,style,iframe').forEach(n => n.remove());
    tmp.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.rel = 'noopener noreferrer'; a.style.color = 'var(--purple-light)'; });
    return tmp.innerHTML;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
